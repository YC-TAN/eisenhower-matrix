name: Playwright API Tests
on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - 'shared/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'backend/**'
      - 'shared/**'
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Build shared
      run: npm run build --workspace=shared
    - name: Run Playwright tests
      working-directory: backend
      run: npm test
      env:
        MONGO_URI: mongodb://localhost:27017/todo-matrix-test
        NODE_ENV: test
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
